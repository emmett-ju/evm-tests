name = "juchain-testnet"
rpc_url = "https://testnet-rpc.juchain.org"
chain_id = 202599
hardfork = "cancun"
admin_account = "0x9d50666A60E0573Eb8789Ff7AcadB4666C0A5E7B"
admin_key_source = "env:JUCHAIN_PRIVATE_KEY"
trace_support = true

[gas_policy]
gas_limit = 30000000
max_fee_per_gas = 20000000000
max_priority_fee_per_gas = 1000000007

[namespace_policy]
prefix = "evmtest"
reuse_strategy = "idempotent"

[feature_flags]
base_fee = true
blob = false
large_log_payload = true
max_create_child_code = true
create_collision = true
large_nonzero_returndata = true
selfdestruct_created_clears_code = false
clz = true
bls12_381_precompiles = true
p256verify_precompile = true
modexp_eip7883 = true
calldata_floor_eip7623 = true
eip7702 = true
blob_cell_proofs = false

# block_access_lists is false because the current test framework lacks support
# for building and asserting EIP-2930 access list transactions.
block_access_lists = false

# prevrandao is false by intentional design choice in Juchain's Congress/PoA consensus.
# - Congress has no Beacon chain, so there is no real beacon randao.
# - Legacy Clique/PoA logic requires the RPC MixDigest == 0.
# - To ensure the EVM PREVRANDAO opcode does not return 0, Juchain uses keccak(block.number).
# This causes an intentional mismatch between the RPC mixHash and the actual EVM
# execution state, which breaks the test harness's prediction oracle.
prevrandao = false

[block_context]
rpc_block_tag = "latest"
